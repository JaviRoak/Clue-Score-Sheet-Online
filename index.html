<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="stylesheet" href="styles.css">
<title>Clue — Hoja de Anotaciones</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

</head>
<body>
<main>
  <!-- ══════════════ HEADER ══════════════ -->
  <header>
    <div class="brand">
      <div class="mark">c</div>
      <div>
        <div class="wordmark"><em>Clue</em></div>
        <div style="font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:0.2em;color:var(--ink-ghost);text-transform:uppercase;margin-top:2px;">Hoja de Anotaciones · Deducción</div>
      </div>
    </div>
    <div class="case-meta">
      <div><span class="lbl">Caso Nº</span> <span class="val" id="caseNo">0421</span></div>
      <div><span class="lbl">Ronda</span> <span class="val" id="roundNo">1</span></div>
      <div><span class="lbl" id="dateStr">22 abr 2026</span></div>
    </div>
  </header>

  <!-- ═══════════════ PLAYERS ═══════════════ -->
  <div class="players" id="players"></div>
  <div class="subbar">
    <div class="turn-ind">
      <span class="dot" id="turnDot"></span>
      <span>Anotando como <strong id="turnName" style="color:var(--ink);font-weight:600;letter-spacing:0.02em;">—</strong></span>
    </div>
    <button id="editBtn">Editar jugadores ✎</button>
  </div>

  <!-- ═══════════════ SHEET ═══════════════ -->
  <div class="sheet" id="sheet"></div>

  <!-- ═══════════════ SOLUTION ═══════════════ -->
  <div class="solution">
    <div class="label">▲  Hipótesis de trabajo</div>
    <div class="hyp" id="hyp">
      Fue <span class="slot" id="hyp-0">sospechoso</span>, con <span class="slot" id="hyp-1">arma</span>, en <span class="slot" id="hyp-2">lugar</span>.
    </div>
  </div>

  <!-- ═══════════════ LEGEND ═══════════════ -->
  <div class="legend">
    <div class="legend-items">
      <span class="lg-item"><span class="g" style="font-style:italic;">✓</span> tiene carta</span>
      <span class="lg-item"><span class="g">—</span> no tiene</span>
      <span class="lg-item"><span class="g" style="opacity:0.55;font-style:italic;">?</span> sospecho</span>
      <span class="lg-item"><span class="g" style="color:var(--gold);">★</span> en el sobre</span>
    </div>
  </div>

  <div class="footer-actions">
    <button id="nextRoundBtn">Siguiente ronda →</button>
    <button id="resetBtn" class="danger">Reiniciar hoja</button>
  </div>
</main>

<!-- ═══════════════ EDIT MODAL ═══════════════ -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-head">
      <div class="title">Editar jugadores</div>
      <div class="subt">3 – 6 jugadores</div>
    </div>
    <div id="nameFields"></div>
    <div class="modal-btns">
      <button id="cancelBtn">Cancelar</button>
      <button id="saveBtn" class="primary">Guardar</button>
    </div>
  </div>
</div>

<!-- ═══════════════ TWEAKS ═══════════════ -->
<div class="tweaks" id="tweaks">
  <h4>Ajustes <span>en vivo</span></h4>
  <div class="tweak-row">
    <div class="lbl">Símbolos</div>
    <div class="tweak-opts" data-key="glyphs">
      <button data-val="classic">Clásico</button>
      <button data-val="letters">Letras</button>
      <button data-val="dots">Puntos</button>
    </div>
  </div>
  <div class="tweak-row">
    <div class="lbl">Densidad</div>
    <div class="tweak-opts" data-key="density">
      <button data-val="cozy">Cómoda</button>
      <button data-val="tight">Compacta</button>
    </div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════
   Clue — original detective-notebook scoresheet
   ═══════════════════════════════════════════════════ */

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "glyphs": "classic",
  "density": "cozy"
}/*EDITMODE-END*/;

const STORAGE_KEY = 'clue.state.v2';

/* Jugadores por defecto (del original) */
const PLAYERS_DEFAULT = [
  { name: 'J1', initial: '1' },
  { name: 'J2', initial: '2' },
  { name: 'J3', initial: '3' },
  { name: 'J4', initial: '4' },
  { name: 'J5', initial: '5' },
  { name: 'J6', initial: '6' },
];

const SUSPECTS = [
  'Verduzco',
  'Mostaza',
  'Moreno',
  'Moradillo',
  'Escarlata',
  'Blanco',
];

const WEAPONS = [
  'Candelabro',
  'Daga',
  'Tubo de plomo',
  'Revólver',
  'Soga',
  'Llave inglesa',
];

const ROOMS = [
  'Salón de baile',
  'Sala de billar',
  'Terraza',
  'Comedor',
  'Pasillo',
  'Cocina',
  'Biblioteca',
  'Sala',
  'Estudio',
];

const CATEGORIES = [
  { id: 'who',   title: '¿Quién?',  en: 'Sospechosos', num: 'I',   items: SUSPECTS },
  { id: 'what',  title: '¿Con qué?', en: 'Armas',       num: 'II',  items: WEAPONS },
  { id: 'where', title: '¿Dónde?',   en: 'Lugares',     num: 'III', items: ROOMS },
];

const GLYPH_SETS = {
  classic: { has: '✓', no: '—', maybe: '?' },
  letters: { has: 'H', no: 'N', maybe: '·' },
  dots:    { has: '●', no: '○', maybe: '◐' },
};
const STATES = ['', 'has', 'maybe', 'no']; // cycle order

/* ── State ── */
let state = {
  players: PLAYERS_DEFAULT.map((p, i) => ({
    ...p,
    enabled: i < 4, // 4 by default
  })),
  active: 0,
  round: 1,
  caseNo: Math.floor(1000 + Math.random() * 8999).toString().padStart(4, '0'),
  // cells keyed as `${catId}.${rowIdx}.${playerIdx}` → stateKey
  cells: {},
  // solved (envelope) keyed as `${catId}.${rowIdx}` → true
  solved: {},
  tweaks: { ...TWEAK_DEFAULTS },
};

/* ── Load persisted ── */
try {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    const parsed = JSON.parse(saved);
    state = { ...state, ...parsed, tweaks: { ...TWEAK_DEFAULTS, ...(parsed.tweaks || {}) } };
  }
} catch {}

function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch {}
}

/* ── Helpers ── */
function getPlayerColor(i) {
  return `var(--p${i})`;
}
function activePlayerIndices() {
  return state.players.map((p, i) => p.enabled ? i : -1).filter(i => i >= 0);
}
function activePlayer() {
  // if the current active is disabled, jump to first enabled
  if (!state.players[state.active]?.enabled) {
    state.active = activePlayerIndices()[0] ?? 0;
  }
  return state.active;
}

/* ═══════════════ RENDER ═══════════════ */
function renderPlayers() {
  const el = document.getElementById('players');
  el.innerHTML = '';
  state.players.forEach((p, i) => {
    const btn = document.createElement('button');
    btn.className = 'player' + (i === state.active && p.enabled ? ' active' : '');
    btn.style.setProperty('--_c', getPlayerColor(i));
    btn.dataset.empty = !p.enabled;
    btn.innerHTML = `
      <div class="avatar">${p.initial || (p.name[0] || '·').toUpperCase()}</div>
      <div class="pname">${p.enabled ? escape(p.name) : '—'}</div>
    `;
    btn.onclick = () => {
      if (!p.enabled) return;
      state.active = i;
      renderPlayers();
      renderSheet();
      renderSubbar();
      save();
    };
    el.appendChild(btn);
  });
}

function renderSubbar() {
  const p = state.players[activePlayer()];
  const dot = document.getElementById('turnDot');
  dot.style.background = getPlayerColor(activePlayer());
  document.getElementById('turnName').textContent = p?.name || '—';
  document.getElementById('turnName').style.color = getPlayerColor(activePlayer());
  document.getElementById('caseNo').textContent = state.caseNo;
  document.getElementById('roundNo').textContent = state.round;
  document.getElementById('dateStr').textContent = new Date().toLocaleDateString('es-ES', { month:'short', day:'numeric', year:'numeric' });
}

function renderSheet() {
  const sheet = document.getElementById('sheet');
  sheet.innerHTML = '';
  const act = activePlayer();
  const enabled = activePlayerIndices();
  const glyphs = GLYPH_SETS[state.tweaks.glyphs] || GLYPH_SETS.classic;

  CATEGORIES.forEach((cat, ci) => {
    const head = document.createElement('div');
    head.className = 'section-head';
    head.innerHTML = `
      <div class="num">${cat.num}</div>
      <div class="title">${cat.title}</div>
      <div class="title-en">${cat.en}</div>
    `;
    sheet.appendChild(head);

    // turn strip — shows active column
    const strip = document.createElement('div');
    strip.className = 'turn-strip';
    const bead = document.createElement('div');
    bead.className = 'bead';
    bead.style.setProperty('--_c', getPlayerColor(act));
    strip.appendChild(bead);
    sheet.appendChild(strip);

    const rows = document.createElement('div');
    rows.className = 'rows';

    cat.items.forEach((label, ri) => {
      const row = document.createElement('div');
      row.className = 'row';
      const solvedKey = `${cat.id}.${ri}`;
      if (state.solved[solvedKey]) row.classList.add('solved');

      const lbl = document.createElement('div');
      lbl.className = 'row-label';
      lbl.innerHTML = `
        <span class="idx">${String(ri + 1).padStart(2, '0')}</span>
        <span>${escape(label)}</span>
        <button class="envelope-btn" title="Marcar como en el sobre">★</button>
      `;
      lbl.querySelector('.envelope-btn').onclick = (e) => {
        e.stopPropagation();
        state.solved[solvedKey] = !state.solved[solvedKey];
        renderSheet();
        renderSolution();
        save();
      };
      row.appendChild(lbl);

      const cells = document.createElement('div');
      cells.className = 'cells';
      state.players.forEach((p, pi) => {
        if (!p.enabled) return;
        const cell = document.createElement('button');
        cell.className = 'cell' + (pi === act ? ' active-col is-turn' : '');
        cell.style.setProperty('--_c', getPlayerColor(pi));
        const key = `${cat.id}.${ri}.${pi}`;
        const st = state.cells[key] || '';
        if (st) {
          cell.dataset.state = st;
          const glyph = document.createElement('span');
          glyph.className = 'glyph';
          glyph.textContent = glyphs[st];
          cell.appendChild(glyph);
        }
        cell.onclick = () => cycleCell(cat.id, ri, pi);
        cells.appendChild(cell);
      });

      row.appendChild(cells);
      rows.appendChild(row);
    });

    sheet.appendChild(rows);

    // position bead after render
    requestAnimationFrame(() => {
      const firstCell = rows.querySelector('.cell.is-turn');
      if (!firstCell || !strip.parentElement) return;
      const stripRect = strip.getBoundingClientRect();
      const cellRect = firstCell.getBoundingClientRect();
      const left = cellRect.left - stripRect.left;
      bead.style.left = `${left}px`;
      bead.style.width = `${cellRect.width}px`;
    });
  });
}

function cycleCell(catId, ri, pi) {
  const act = activePlayer();
  if (pi !== act) {
    // switch to that player instead of editing
    state.active = pi;
    renderPlayers(); renderSheet(); renderSubbar(); save();
    return;
  }
  const key = `${catId}.${ri}.${pi}`;
  const cur = state.cells[key] || '';
  const nextIdx = (STATES.indexOf(cur) + 1) % STATES.length;
  const next = STATES[nextIdx];
  if (next === '') delete state.cells[key];
  else state.cells[key] = next;
  renderSheet();
  renderSolution();
  save();
}

function renderSolution() {
  CATEGORIES.forEach((cat, ci) => {
    const slot = document.getElementById('hyp-' + ci);
    if (!slot) return;
    // look for items marked solved first
    const solvedItem = cat.items.find((_, ri) => state.solved[`${cat.id}.${ri}`]);
    if (solvedItem) {
      slot.textContent = solvedItem;
      slot.classList.add('filled');
      return;
    }
    // otherwise infer: item that no enabled player "has", and all enabled players have at least one "no" for? Simplified: item that no one 'has' where other items have been claimed
    const enabled = activePlayerIndices();
    const heldItems = cat.items.map((_, ri) =>
      enabled.some(pi => state.cells[`${cat.id}.${ri}.${pi}`] === 'has')
    );
    const heldCount = heldItems.filter(Boolean).length;
    if (heldCount === cat.items.length - 1) {
      const unheldIdx = heldItems.findIndex(h => !h);
      slot.textContent = cat.items[unheldIdx];
      slot.classList.add('filled');
    } else {
      slot.textContent = { who: 'sospechoso', what: 'arma', where: 'lugar' }[cat.id];
      slot.classList.remove('filled');
    }
  });
}

/* ═══════════════ MODAL ═══════════════ */
function openEdit() {
  const c = document.getElementById('nameFields');
  c.innerHTML = '';
  state.players.forEach((p, i) => {
    const row = document.createElement('div');
    row.className = 'name-row';
    row.innerHTML = `
      <div class="chip ${p.enabled ? '' : 'dis'}" style="--_c: var(--p${i})">${(p.initial || p.name[0] || '·').toUpperCase()}</div>
      <input type="text" maxlength="14" value="${p.enabled ? escape(p.name) : ''}" placeholder="Jugador ${i+1}" ${p.enabled ? '' : 'disabled'} data-i="${i}">
      <button class="toggle ${p.enabled ? 'on' : ''}" data-i="${i}">${p.enabled ? 'SÍ' : 'NO'}</button>
    `;
    const toggle = row.querySelector('.toggle');
    const input = row.querySelector('input');
    const chip = row.querySelector('.chip');
    toggle.onclick = () => {
      const now = !toggle.classList.contains('on');
      // enforce 3-6
      const enabledCount = [...document.querySelectorAll('#nameFields .toggle.on')].length;
      if (now === false && enabledCount <= 3) { input.focus(); return; }
      if (now === true && enabledCount >= 6) return;
      toggle.classList.toggle('on', now);
      toggle.textContent = now ? 'SÍ' : 'NO';
      input.disabled = !now;
      chip.classList.toggle('dis', !now);
      if (now && !input.value) input.value = PLAYERS_DEFAULT[i].name;
    };
    c.appendChild(row);
  });
  document.getElementById('overlay').classList.add('open');
}
function closeEdit() { document.getElementById('overlay').classList.remove('open'); }
function saveEdit() {
  document.querySelectorAll('#nameFields .name-row').forEach((row, i) => {
    const on = row.querySelector('.toggle').classList.contains('on');
    const val = row.querySelector('input').value.trim() || PLAYERS_DEFAULT[i].name;
    state.players[i].enabled = on;
    state.players[i].name = val;
    state.players[i].initial = val[0].toUpperCase();
    });
    if (!state.players[state.active].enabled) state.active = activePlayerIndices()[0] || 0;
  closeEdit();
  renderPlayers(); renderSheet(); renderSubbar(); renderSolution();
  save();
}

/* ═══════════════ TWEAKS ═══════════════ */
window.addEventListener('message', (e) => {
  if (!e.data || typeof e.data !== 'object') return;
  if (e.data.type === '__activate_edit_mode') document.getElementById('tweaks').classList.add('open');
  if (e.data.type === '__deactivate_edit_mode') document.getElementById('tweaks').classList.remove('open');
});
setTimeout(() => {
  try { window.parent.postMessage({type: '__edit_mode_available'}, '*'); } catch {}
}, 50);

function applyTweaks() {
  document.body.dataset.density = state.tweaks.density;
  if (state.tweaks.density === 'tight') {
    document.documentElement.style.setProperty('--row-h', '32px');
  } else {
    document.documentElement.style.removeProperty('--row-h');
  }
  document.querySelectorAll('#tweaks .tweak-opts').forEach(opts => {
    const key = opts.dataset.key;
    opts.querySelectorAll('button').forEach(b => {
      b.classList.toggle('on', b.dataset.val === state.tweaks[key]);
    });
  });
  renderSheet();
}

document.querySelectorAll('#tweaks .tweak-opts button').forEach(btn => {
  btn.onclick = () => {
    const key = btn.parentElement.dataset.key;
    const val = btn.dataset.val;
    state.tweaks[key] = val;
    applyTweaks();
    try {
      window.parent.postMessage({type: '__edit_mode_set_keys', edits: { [key]: val }}, '*');
    } catch {}
    save();
  };
});

/* ═══════════════ HELPERS ═══════════════ */
function escape(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

/* ═══════════════ WIRE UP ═══════════════ */
document.getElementById('editBtn').onclick = openEdit;
document.getElementById('cancelBtn').onclick = closeEdit;
document.getElementById('saveBtn').onclick = saveEdit;
document.getElementById('overlay').addEventListener('click', (e) => {
  if (e.target.id === 'overlay') closeEdit();
});
document.getElementById('nextRoundBtn').onclick = () => {
  state.round++;
  renderSubbar();
  save();
};
document.getElementById('resetBtn').onclick = () => {
  if (!confirm('¿Reiniciar la hoja? Los jugadores se conservan.')) return;
  state.cells = {};
  state.solved = {};
  state.round = 1;
  state.caseNo = Math.floor(1000 + Math.random() * 8999).toString().padStart(4, '0');
  renderSheet(); renderSubbar(); renderSolution();
  save();
};

/* Repo bead position on resize */
window.addEventListener('resize', () => renderSheet());

/* ── Init ── */
applyTweaks();
renderPlayers();
renderSheet();
renderSubbar();
renderSolution();
</script>
</body>
</html>
